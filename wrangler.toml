#:schema node_modules/wrangler/config-schema.json
name = "shinedigitalstore-1"
compatibility_date = "2024-01-01"

# 🧠 ပင်မ Worker script (ဦးနှောက်) ကို ပြန်လည်သတ်မှတ်ခြင်း
main = "functions/api.js"

# 1️⃣ D1 Database ချိတ်ဆက်မှု
[[d1_databases]]
binding = "DB"
database_name = "shine-d"
database_id = "7fbda3c1-618c-13e1-e0f9-c4a7adb56c64"

# 2️⃣ R2 Storage Bucket ချိတ်ဆက်မှု
[[r2_buckets]]
binding = "SHINE_MEDIA"
bucket_name = "shine-media"

# 3️⃣ Static Assets နေရာ
[assets]
directory = "./"
