<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Shine Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; }
        .cyber-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(59, 130, 246, 0.15); box-shadow: 0 0 40px rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm cyber-card p-8 rounded-[2.5rem] text-center space-y-4">
        <div class="w-16 h-16 bg-blue-500/10 border border-blue-500/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
            </svg>
        </div>

        <h2 class="text-xl font-black text-blue-500 uppercase tracking-widest">Logging Out...</h2>
        <p class="text-slate-400 text-xs font-medium">ကျေးဇူးပြု၍ ခဏစောင့်ပါ၊ အကောင့်မှ ထွက်ခွာနေပါသည်။</p>
    </div>

    <script>
        // LocalStorage ထဲက User အချက်အလက်များကို ရှင်းလင်းခြင်း (PHP Session Destroy ကဲ့သို့ အလုပ်လုပ်သည်)
        localStorage.removeItem('user');
        localStorage.clear();

        // ၃ စက္ကန့် (သို့မဟုတ်) ချက်ချင်း login.html သို့ ပြန်ပို့ရန်
        setTimeout(() => {
            window.location.href = "login.html";
        }, 1000);
    </script>
</body>
</html>
