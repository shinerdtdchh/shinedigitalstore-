<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - Shine Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex justify-center items-center font-sans p-4">

    <!-- Profile Container -->
    <div class="w-full max-w-md bg-slate-800 rounded-3xl p-6 border border-slate-700 shadow-2xl flex flex-col items-center">
        
        <!-- Profile Image -->
        <div class="relative mb-4">
            <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 p-1">
                <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=ShineUser" class="w-full h-full rounded-full bg-slate-900 object-cover">
            </div>
            <span class="absolute bottom-1 right-1 w-4 h-4 bg-green-500 border-2 border-slate-800 rounded-full"></span>
        </div>

        <!-- User Info -->
        <h2 id="user-name" class="text-xl font-bold text-slate-100">Customer Name</h2>
        <p id="user-id" class="text-xs text-cyan-400 font-mono mt-1">ID: User_0000</p>

        <!-- Details Card -->
        <div class="w-full bg-slate-900/60 rounded-2xl p-4 my-6 space-y-3 border border-slate-700/50">
            <div class="flex justify-between text-xs">
                <span class="text-slate-400">Status</span>
                <span class="text-green-400 font-semibold">Active Member</span>
            </div>
            <div class="flex justify-between text-xs">
                <span class="text-slate-400">Support Access</span>
                <span class="text-slate-200">24/7 Available</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="w-full space-y-3">
            <!-- Go to Chat Button -->
            <a href="chat.html" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-3 rounded-2xl flex items-center justify-center space-x-2 transition shadow-lg active:scale-95">
                <i class="fa-solid fa-comments"></i>
                <span>Support Chat သို့သွားရန်</span>
            </a>

            <!-- Log Out Button -->
            <button onclick="handleLogout()" class="w-full bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500 hover:text-white font-bold py-3 rounded-2xl flex items-center justify-center space-x-2 transition active:scale-95">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>အကောင့်မှ ထွက်မည် (Log Out)</span>
            </button>
        </div>

    </div>

    <script>
        // 1. User Data ရယူခြင်း
        const savedUserId = localStorage.getItem("shine_chat_user_id") || "User_" + Math.floor(1000 + Math.random() * 9000);
        
        // Display Info
        document.getElementById("user-id").innerText = "ID: " + savedUserId;
        document.getElementById("user-name").innerText = savedUserId;
        document.getElementById("user-avatar").src = "https://api.dicebear.com/7.x/bottts/svg?seed=" + savedUserId;

        // 2. Log Out Function
        function handleLogout() {
            // Confirm Alert ပြခြင်း
            if (confirm("အကောင့်မှ ထွက်မှာ သေချာပါသလား?")) {
                // LocalStorage ထဲက User Session များကို ရှင်းထုတ်ခြင်း
                localStorage.removeItem("shine_chat_user_id");
                
                // Login သို့မဟုတ် Home Page သို့ ပြန်ညွှန်းခြင်း
                window.location.href = "index.html"; // မိမိ Login/Home Page ရဲ့ file name ပြောင်းပေးနိုင်ပါတယ်
            }
        }
    </script>
</body>
</html>
