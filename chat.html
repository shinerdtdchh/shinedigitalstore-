<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - Shine Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Pusher JS Library -->
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; }
        .cyber-bg { background: radial-gradient(circle at top, rgba(30, 41, 59, 0.5) 0%, rgba(2, 6, 23, 1) 100%); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .bottom-nav-glass { background: rgba(18, 16, 36, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border-radius: 2rem 2rem 0 0; }
        .floating-add-btn { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen w-full cyber-bg overflow-hidden">

    <div class="w-full h-screen max-w-lg flex flex-col bg-slate-950/40 border-x border-slate-900/80 relative">
        <!-- Top Bar -->
        <div class="text-center pt-5 pb-3 border-b border-slate-900/80 shrink-0 bg-slate-950/80 backdrop-blur-md">
            <h1 class="text-base font-black text-blue-500 uppercase tracking-widest italic">Shine Digital Store</h1>
            <div class="flex items-center justify-center gap-1.5 mt-0.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span>
                <p class="text-[9px] text-emerald-400 font-bold tracking-wider uppercase">Online</p>
            </div>
        </div>
        
        <!-- Chat Container -->
        <div id="chat_scroll_box" class="flex-1 overflow-y-auto space-y-3.5 p-4 bg-slate-950/20 flex flex-col scrollbar-hide"></div>
        
        <!-- Input Form -->
        <form id="chatForm" class="flex gap-2 p-3 border-t border-slate-900/60 bg-slate-950/90 backdrop-blur-md items-center shrink-0" onsubmit="sendChat(event)">
            <input type="file" id="chat_file_input" accept="image/*" class="hidden" onchange="triggerFileSend()">
            <button type="button" onclick="document.getElementById('chat_file_input').click()" class="bg-slate-900 border border-slate-800 p-3.5 rounded-2xl text-slate-400 hover:text-blue-400 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 00.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" /></svg>
            </button>
            <input type="text" id="user_chat_msg" placeholder="မက်ဆေ့ခ်ျ ရိုက်ထည့်ပါ..." class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-3 text-xs outline-none focus:border-blue-500 text-white font-medium" autocomplete="off">
            <button type="submit" class="bg-blue-600 px-5 py-3 rounded-2xl font-black text-xs text-white">SEND</button>
        </form>

        <!-- Bottom Navigation -->
        <div class="w-full bottom-nav-glass px-2 py-2 flex justify-between items-center shrink-0 h-16">
            <a href="index.html" class="flex-1 text-center opacity-50 text-[9px] font-bold">Home</a>
            <a href="post.html" class="flex-1 text-center opacity-50 text-[9px] font-bold">Posts</a>
            <div class="flex-1 flex justify-center relative -top-4"><a href="index.html" class="w-12 h-12 rounded-full floating-add-btn flex items-center justify-center text-white text-xl">+</a></div>
            <a href="chat.html" class="flex-1 text-center text-blue-500 text-[9px] font-black">Chats</a>
            <a href="profile.html" class="flex-1 text-center opacity-50 text-[9px] font-bold">Profile</a>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat_scroll_box');
        const API_BASE = 'https://api.shinedigitalstore.com/'; 

        // -------------------------------------------------------------
        // ⚡ PUSHER REAL-TIME SETUP
        // -------------------------------------------------------------
        const pusher = new Pusher('10db870f9cf78d100aca', {
            cluster: 'ap1'
        });

        // Channel ကို Listen လုပ်ခြင်း
        const channel = pusher.subscribe('chat-channel');

        // စာအသစ် ရောက်လာရင် Auto မျက်နှာပြင်ပေါ် ထည့်ပေးခြင်း
        channel.bind('new-message', function(msg) {
            appendMessage(msg);
        });

        // စာတို သို့မဟုတ် ပုံကို Screen ပေါ် သို့ ရေးဆွဲပေးသည့် Function
        function appendMessage(msg) {
            const is_me = (msg.sender !== 'owner');
            const bg_color = is_me ? 'bg-blue-600 self-end text-right text-white' : 'bg-slate-900 border border-slate-800 self-start text-left text-slate-200';
            const align_self = is_me ? 'self-end' : 'self-start';

            let msgElement = document.createElement('div');

            if (msg.media_url) {
                msgElement.className = `max-w-[250px] p-1 rounded-2xl bg-slate-900/40 border border-slate-800/30 ${align_self}`;
                msgElement.innerHTML = `
                    <img src="${msg.media_url}" class="w-full h-auto rounded-xl max-h-[250px] object-contain">
                    <div class="text-[8px] opacity-40 flex justify-end px-1.5 mt-1"><span>${msg.time || ''}</span></div>
                `;
            } else {
                msgElement.className = `max-w-[85%] p-3.5 rounded-2xl text-xs ${bg_color} ${align_self}`;
                msgElement.innerHTML = `
                    <p class="leading-relaxed text-[13px]">${msg.message}</p>
                    <div class="text-[8px] opacity-40 flex justify-end mt-1.5"><span>${msg.time || ''}</span></div>
                `;
            }

            // Empty State ရှိနေပါက ဖျက်ပစ်မည်
            if (chatBox.querySelector('.empty-chat-placeholder')) {
                chatBox.innerHTML = '';
            }

            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // -------------------------------------------------------------
        // 📥 OLD CHATS LOAD ( စာမျက်နှာ စဖွင့်ချိန် အဟောင်းများ ခေါ်ယူခြင်း )
        // -------------------------------------------------------------
        function loadChats() {
            fetch(`${API_BASE}?action=get_messages&user=user`)
                .then(res => res.json())
                .then(data => {
                    chatBox.innerHTML = "";
                    if (!Array.isArray(data) || data.length === 0) {
                        chatBox.innerHTML = "<div class='empty-chat-placeholder my-auto text-center opacity-30'><p class='text-xs'>💬 Chat Active</p></div>";
                        return;
                    }
                    data.forEach(msg => appendMessage(msg));
                })
                .catch(() => {
                    chatBox.innerHTML = "<div class='empty-chat-placeholder my-auto text-center opacity-30'><p class='text-xs'>💬 Chat Active</p></div>";
                });
        }

        // -------------------------------------------------------------
        // 📤 SEND MESSAGES ( စာတို ပို့ခြင်း )
        // -------------------------------------------------------------
        async function sendChat(e) {
            e.preventDefault();
            const msgInput = document.getElementById('user_chat_msg');
            const txt = msgInput.value.trim();
            if(!txt) return;
            msgInput.value = "";

            await fetch(`${API_BASE}?action=messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: 'user', message: txt })
            });
        }

        // -------------------------------------------------------------
        // 🖼️ UPLOAD IMAGE ( ပုံ တင်ခြင်း )
        // -------------------------------------------------------------
        function triggerFileSend() {
            const fileInput = document.getElementById('chat_file_input');
            if(fileInput.files.length === 0) return;
            const file = fileInput.files[0];
            
            const uniqueId = 'up_' + Date.now();
            const localImgUrl = URL.createObjectURL(file);

            // Uploading Loader Bubble
            const loaderHtml = `
                <div id="${uniqueId}" class='tg-loading-bubble max-w-[250px] p-1 rounded-2xl bg-slate-900/40 border border-slate-800/30 self-end relative overflow-hidden'>
                    <div class='relative rounded-xl overflow-hidden flex items-center justify-center' style='min-height:145px;'>
                        <img src='${localImgUrl}' class='w-full h-full object-cover blur-[5px] opacity-50 scale-105'>
                        <div class='absolute inset-0 m-auto flex flex-col items-center justify-center gap-1.5 bg-slate-950/40'>
                            <div class='w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin'></div>
                            <span id="text_${uniqueId}" class='text-[9px] font-black text-blue-400 bg-slate-950 px-2 py-0.5 rounded-full'>0%</span>
                        </div>
                    </div>
                </div>`;
            chatBox.innerHTML += loaderHtml;
            chatBox.scrollTop = chatBox.scrollHeight;

            const xhr = new XMLHttpRequest();
            const formData = new FormData();
            formData.append('file', file);

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    const percentTxt = document.getElementById(`text_${uniqueId}`);
                    if(percentTxt) percentTxt.innerText = percent + '%';
                }
            });

            xhr.onreadystatechange = async function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    const resData = JSON.parse(xhr.responseText);
                    await fetch(`${API_BASE}?action=messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: 'user', message: resData.url, media_url: resData.url })
                    });
                    const loaderEl = document.getElementById(uniqueId);
                    if (loaderEl) loaderEl.remove();
                }
            };
            xhr.open('POST', `${API_BASE}?action=upload`, true);
            xhr.send(formData);
            fileInput.value = "";
        }

        // စာမျက်နှာ စဖွင့်တာနဲ့ စာအဟောင်းများကို အကန့်အသတ်မရှိ (၁ ကြိမ်) ဆွဲယူမည်
        loadChats();
    </script>
</body>
</html>
