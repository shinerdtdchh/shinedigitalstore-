<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Chat - Shine Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <div class="bg-blue-600 text-white p-4 font-bold text-center text-lg shadow-md flex justify-between items-center px-6">
        <span>💬 Shine Digital Store Support</span>
        <span id="status" class="text-xs bg-green-500 px-2 py-1 rounded-full">Online 🟢</span>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

    <div class="bg-white p-3 border-t flex space-x-2">
        <input type="text" id="message-input" placeholder="စာရိုက်ပါ..." class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
        <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg text-sm transition">
            ပို့မည်
        </button>
    </div>

    <script>
        // Free Public Realtime Database Config
        const firebaseConfig = {
            databaseURL: "https://shine-store-chat-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const userId = "User_" + Math.floor(Math.random() * 10000);

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            database.ref("messages").push({
                sender: userId,
                text: text,
                role: "customer",
                timestamp: Date.now()
            });

            input.value = "";
        }

        database.ref("messages").on("child_added", (snapshot) => {
            const msg = snapshot.val();
            const chatBox = document.getElementById('chat-box');
            const isMe = msg.sender === userId;

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
            msgDiv.innerHTML = `
                <span class="text-xs text-gray-400 mb-1">${msg.role === 'owner' ? '👑 Owner' : msg.sender}</span>
                <div class="${isMe ? 'bg-blue-600 text-white' : (msg.role === 'owner' ? 'bg-green-600 text-white' : 'bg-white text-gray-800')} p-3 rounded-xl max-w-xs text-sm shadow">
                    ${msg.text}
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
