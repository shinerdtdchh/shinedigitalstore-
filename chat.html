<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Chat - Shine Store</title>
    <!-- Tailwind CSS for UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Stream Chat SDK JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/stream-chat"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-blue-600 text-white p-4 font-bold text-center text-lg shadow-md flex justify-between items-center px-6">
        <span>💬 Shine Digital Store Chat</span>
        <span id="status" class="text-xs bg-blue-700 px-2 py-1 rounded-full">Connecting...</span>
    </div>

    <!-- Chat Messages Box -->
    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3">
        <!-- Messages will load here dynamically -->
    </div>

    <!-- Input Section -->
    <div class="bg-white p-3 border-t flex flex-col space-y-2">
        <div id="file-name-display" class="hidden text-xs text-blue-600 font-semibold px-2"></div>
        <div class="flex items-center space-x-2">
            <!-- File Input Button -->
            <label class="cursor-pointer bg-gray-200 hover:bg-gray-300 text-gray-700 px-3 py-2 rounded-lg text-lg">
                📁
                <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFileSelect()">
            </label>
            <!-- Message Input -->
            <input type="text" id="message-input" placeholder="စာရိုက်ပါ..." class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500">
            <!-- Send Button -->
            <button onclick="sendMessage()" id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 py-2 rounded-lg text-sm transition">
                ပို့မည်
            </button>
        </div>
    </div>

    <script>
        // GetStream Credentials
        const API_KEY = "srcxzrwfghdq";
        
        // Random User Generator for Anonymous Visitors
        const userId = "user_" + Math.floor(Math.random() * 100000);
        const userName = "Customer " + userId.split('_')[1];

        let client;
        let channel;

        async function initChat() {
            try {
                // Initialize Stream Chat Client
                client = StreamChat.getInstance(API_KEY);

                // Connect User (Dev Token Mode for Client-side testing)
                await client.connectUser(
                    { id: userId, name: userName },
                    client.devToken(userId)
                );

                // Set up or Join Public Chat Channel
                channel = client.channel('messaging', 'shine_store_public', {
                    name: 'General Customer Support'
                });

                await channel.watch();

                document.getElementById('status').innerText = "Online 🟢";
                document.getElementById('status').className = "text-xs bg-green-500 px-2 py-1 rounded-full";

                // Listen for New Incoming Messages in Real-time
                channel.on('message.new', event => {
                    renderMessage(event.message);
                });

                // Load existing message history
                const state = await channel.watch();
                state.messages.forEach(msg => renderMessage(msg));

            } catch (err) {
                console.error("Chat Init Error:", err);
                document.getElementById('status').innerText = "Error 🔴";
            }
        }

        function handleFileSelect() {
            const fileInput = document.getElementById('file-input');
            const fileNameDisplay = document.getElementById('file-name-display');
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerText = "ရွေးချယ်ထားသော ဖိုင်: " + fileInput.files[0].name;
                fileNameDisplay.classList.remove('hidden');
            } else {
                fileNameDisplay.classList.add('hidden');
            }
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const fileInput = document.getElementById('file-input');
            const sendBtn = document.getElementById('send-btn');
            
            const text = input.value.trim();
            const file = fileInput.files[0];

            if (!text && !file) return;

            sendBtn.disabled = true;
            sendBtn.innerText = "ပို့နေသည်...";

            try {
                let attachments = [];

                // Direct Media File Upload to GetStream CDN
                if (file) {
                    let response;
                    if (file.type.startsWith('image/')) {
                        response = await channel.sendImage(file);
                        attachments.push({ type: 'image', image_url: response.file });
                    } else if (file.type.startsWith('video/')) {
                        response = await channel.sendFile(file);
                        attachments.push({ type: 'video', asset_url: response.file });
                    }
                }

                // Send Message
                await channel.sendMessage({
                    text: text,
                    attachments: attachments
                });

                input.value = "";
                fileInput.value = "";
                document.getElementById('file-name-display').classList.add('hidden');

            } catch (error) {
                alert("စာပို့မရပါခင်ဗျာ၊ ထပ်မံကြိုးစားပါ။");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = "ပို့မည်";
            }
        }

        function renderMessage(msg) {
            const chatBox = document.getElementById('chat-box');
            const isMe = msg.user.id === userId;

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;

            let mediaHTML = '';
            if (msg.attachments && msg.attachments.length > 0) {
                msg.attachments.forEach(att => {
                    if (att.type === 'image' || att.image_url) {
                        mediaHTML += `<img src="${att.image_url || att.asset_url}" class="max-w-xs rounded-lg my-1 shadow">`;
                    } else if (att.type === 'video' || att.asset_url) {
                        mediaHTML += `<video controls src="${att.asset_url}" class="max-w-xs rounded-lg my-1 shadow"></video>`;
                    }
                });
            }

            msgDiv.innerHTML = `
                <span class="text-xs text-gray-400 mb-1">${msg.user.name || msg.user.id}</span>
                <div class="${isMe ? 'bg-blue-600 text-white' : 'bg-white text-gray-800'} p-3 rounded-xl max-w-xs text-sm shadow">
                    ${mediaHTML}
                    ${msg.text ? `<div>${msg.text}</div>` : ''}
                </div>
            `;

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Initialize Chat on Page Load
        initChat();
    </script>
</body>
</html>
