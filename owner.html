<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - Shine Store Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">

    <div class="bg-gray-800 p-4 border-b border-gray-700 flex justify-between items-center px-6">
        <h1 class="text-xl font-bold text-blue-400">👑 Admin Chat Center</h1>
        <span class="text-xs bg-green-600 px-3 py-1 rounded-full font-semibold">Active 🟢</span>
    </div>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-950"></div>

    <div class="bg-gray-800 p-4 border-t border-gray-700 flex space-x-3">
        <input type="text" id="message-input" placeholder="Customer ထံ ပြန်စာ ရိုက်ရန်..." class="flex-1 bg-gray-700 text-white border border-gray-600 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500">
        <button onclick="sendOwnerMessage()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-6 py-2.5 rounded-lg text-sm transition">
            ပြန်စာ ပို့မည်
        </button>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://shine-store-chat-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function sendOwnerMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            database.ref("messages").push({
                sender: "Shop Owner",
                text: text,
                role: "owner",
                timestamp: Date.now()
            });

            input.value = "";
        }

        database.ref("messages").on("child_added", (snapshot) => {
            const msg = snapshot.val();
            const chatBox = document.getElementById('chat-box');
            const isOwner = msg.role === 'owner';

            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isOwner ? 'items-end' : 'items-start'}`;
            msgDiv.innerHTML = `
                <span class="text-xs mb-1 ${isOwner ? 'text-blue-400 font-bold' : 'text-green-400 font-bold'}">
                    ${isOwner ? '👑 ' + msg.sender : '👤 ' + msg.sender}
                </span>
                <div class="${isOwner ? 'bg-blue-600 text-white' : 'bg-gray-800 text-gray-100 border border-gray-700'} p-3 rounded-xl max-w-sm text-sm shadow">
                    ${msg.text}
                </div>
            `;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
