<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shine Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #020617; }
        .cyber-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(59, 130, 246, 0.15); box-shadow: 0 0 40px rgba(59, 130, 246, 0.05); }
        .otp-box:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .email-suggestion-item:hover { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    </style>
</head>
<body class="text-white flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm cyber-card p-8 rounded-[2.5rem] relative">
        
        <!-- Back Button (2FA Step ရောက်မှ ပြမည်) -->
        <button id="back_btn" onclick="resetToLogin()" class="hidden absolute top-8 left-7 text-slate-400 hover:text-white bg-slate-900 border border-slate-800 p-2.5 rounded-full transition active:scale-90 flex items-center justify-center cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
            </svg>
        </button>

        <h2 class="text-2xl font-black text-center text-blue-500 mb-8 uppercase tracking-widest italic">Login</h2>
        
        <!-- Alert Box -->
        <div id="alert_box" class="hidden p-4 rounded-2xl mb-5 text-center">
            <p id="alert_text" class="text-xs font-bold"></p>
        </div>

        <!-- STEP 1: Login Form -->
        <div id="login_step_1" class="space-y-4">
            <div class="relative">
                <label class="text-[10px] text-slate-500 font-bold ml-2 uppercase tracking-wider">Username or Email</label>
                <div class="relative mt-1">
                    <input type="text" id="login_user_input" placeholder="username သို့မဟုတ် email" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-sm outline-none focus:border-blue-500/80 transition-all font-medium" required>
                </div>
                
                <div id="email_suggestions" class="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-800 rounded-2xl p-2 hidden z-50 shadow-2xl"></div>
            </div>
            
            <div>
                <label class="text-[10px] text-slate-500 font-bold ml-2 uppercase tracking-wider">Password</label>
                <div class="relative mt-1">
                    <input type="password" id="login_pass_input" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 pr-12 text-sm outline-none focus:border-blue-500/80 transition-all" required>
                    
                    <button type="button" onclick="togglePassword()" class="absolute right-4 top-4 text-slate-500 hover:text-slate-300 transition-colors cursor-pointer">
                        <svg id="eye_icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644r26.27A11.952 11.952 0 0012 20.3c3.41 0 6.51-1.422 8.77-3.707m0 0A11.95 11.95 0 0112 2.944a11.944 11.944 0 01-8.77 3.707M19.5 12a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" />
                        </svg>
                    </button>
                </div>
                
                <div class="flex justify-end mt-2 mr-2">
                    <a href="forgot_password.html" class="text-[11px] text-slate-400 font-medium hover:text-blue-500 transition-colors">Forgot password?</a>
                </div>
            </div>
            
            <button onclick="handleLogin()" id="login_btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg transition-all active:scale-[0.98] mt-4 cursor-pointer">
                LOG IN
            </button>

            <div class="mt-8 pt-6 border-t border-slate-900 text-center">
                <p class="text-slate-500 text-[11px] font-medium">
                    အကောင့်မရှိသေးဘူးလား? 
                    <a href="register.html" class="text-blue-500 font-bold ml-1 hover:underline">အကောင့်ဖွင့်ရန်</a>
                </p>
            </div>
        </div>

        <!-- STEP 2: 2FA OTP Verification -->
        <div id="login_step_2" class="space-y-6 hidden">
            <div class="text-center">
                <p class="text-[10px] text-blue-400 font-black mb-4 uppercase tracking-widest">2-Step Verification</p>
                
                <div class="flex justify-center gap-2" id="otp-container">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                    <input type="number" class="otp-box w-12 h-14 bg-slate-950 border border-slate-800 text-center text-2xl font-black rounded-xl outline-none transition-all" pattern="[0-9]*" inputmode="numeric">
                </div>
            </div>
        </div>

    </div>

    <script>
        // ⚙️ သင့်ရဲ့ Cloudflare Worker URL ကို ဒီမှာ ထည့်ပါ
        const WORKER_URL = "https://muddy-band-2593.shineaung6375.workers.dev";
        let tempUserEmail = "";

        function showAlert(message, type = 'error') {
            const box = document.getElementById('alert_box');
            const text = document.getElementById('alert_text');
            box.classList.remove('hidden');
            if(type === 'error') {
                box.className = "bg-red-500/10 border border-red-500/20 p-4 rounded-2xl mb-5 text-center";
                text.className = "text-red-400 text-xs font-bold";
            } else {
                box.className = "bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-2xl mb-5 text-center";
                text.className = "text-emerald-400 text-xs font-bold";
            }
            text.innerText = message;
        }

        // Email Suggestion Logic
        const userInput = document.getElementById('login_user_input');
        const suggestionsBox = document.getElementById('email_suggestions');
        const allowedDomains = ['gmail.com', 'outlook.com', 'yahoo.com', 'hotmail.com', 'icloud.com'];

        userInput.addEventListener('input', (e) => {
            let val = e.target.value.toLowerCase();
            if (val.includes('@')) {
                const parts = val.split('@');
                const prefix = parts[0];
                const currentDomainPart = parts[1] || "";
                
                let html = "";
                allowedDomains.forEach(domain => {
                    if (domain.startsWith(currentDomainPart)) {
                        html += `<div class="email-suggestion-item p-3 text-sm font-medium rounded-xl cursor-pointer transition-colors" onclick="selectEmail('${prefix}@${domain}')">${prefix}<span class="text-blue-500 font-bold">@${domain}</span></div>`;
                    }
                });

                if (html !== "") {
                    suggestionsBox.innerHTML = html;
                    suggestionsBox.classList.remove('hidden');
                } else {
                    suggestionsBox.classList.add('hidden');
                }
            } else {
                suggestionsBox.classList.add('hidden');
            }
        });

        function selectEmail(fullEmail) {
            userInput.value = fullEmail;
            suggestionsBox.classList.add('hidden');
            userInput.focus();
        }

        document.addEventListener('click', (e) => {
            if (e.target !== userInput && e.target !== suggestionsBox) {
                suggestionsBox.classList.add('hidden');
            }
        });

        function togglePassword() {
            const passInput = document.getElementById('login_pass_input');
            const eyeIcon = document.getElementById('eye_icon');
            if (passInput.type === "password") {
                passInput.type = "text";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`;
                eyeIcon.classList.add('text-blue-500');
            } else {
                passInput.type = "password";
                eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.644r26.27A11.952 11.952 0 0012 20.3c3.41 0 6.51-1.422 8.77-3.707m0 0A11.95 11.95 0 0112 2.944a11.944 11.944 0 01-8.77 3.707M19.5 12a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" />`;
                eyeIcon.classList.remove('text-blue-500');
            }
        }

        // STEP 1: Handle Login Request
        async function handleLogin() {
            const usernameOrMail = document.getElementById('login_user_input').value.trim().toLowerCase();
            const password = document.getElementById('login_pass_input').value;

            if(!usernameOrMail || !password) {
                showAlert("ကျေးဇူးပြု၍ အချက်အလက်များကို ပြည့်စုံစွာ ဖြည့်သွင်းပေးပါ။");
                return;
            }

            try {
                const response = await fetch(`${WORKER_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameOrMail, password })
                });
                const res = await response.json();
                
                if(res.success) {
                    // အကယ်၍ 2FA လိုအပ်ပါက သို့မဟုတ် တိုက်ရိုက်အောင်မြင်ပါက
                    if(res.requires_otp) {
                        tempUserEmail = usernameOrMail;
                        document.getElementById('login_step_1').classList.add('hidden');
                        document.getElementById('login_step_2').classList.remove('hidden');
                        document.getElementById('back_btn').classList.remove('hidden');
                        showAlert(res.message, 'success');
                    } else {
                        localStorage.setItem('user', JSON.stringify(res.user));
                        window.location.href = "index.html";
                    }
                } else {
                    showAlert(res.message);
                }
            } catch(err) {
                showAlert("ဆာဗာသို့ ချိတ်ဆက်၍ မရပါ။");
            }
        }

        function resetToLogin() {
            document.getElementById('login_step_2').classList.add('hidden');
            document.getElementById('login_step_1').classList.remove('hidden');
            document.getElementById('back_btn').classList.add('hidden');
            document.getElementById('alert_box').classList.add('hidden');
        }

        // STEP 2: 2FA OTP Inputs Management
        const otpInputs = document.querySelectorAll('#otp-container input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (input.value.length > 1) input.value = input.value.slice(0, 1);
                if (input.value !== "" && index < otpInputs.length - 1) otpInputs[index + 1].focus();
                checkOtpSubmit();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && input.value === "" && index > 0) otpInputs[index - 1].focus();
            });
        });

        async function checkOtpSubmit() {
            let code = "";
            otpInputs.forEach(input => code += input.value);
            
            if (code.length === 6) {
                try {
                    const response = await fetch(`${WORKER_URL}/api/verify-login-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ identifier: tempUserEmail, otp: code })
                    });
                    const res = await response.json();
                    
                    if(res.success) {
                        localStorage.setItem('user', JSON.stringify(res.user));
                        window.location.href = "index.html";
                    } else {
                        showAlert(res.message);
                    }
                } catch(err) {
                    showAlert("OTP အတည်ပြုရာတွင် အမှားအယွင်း ရှိနေပါသည်။");
                }
            }
        }
    </script>
</body>
</html>
